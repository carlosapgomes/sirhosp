name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure test script is executable
        run: chmod +x ./scripts/test-in-container.sh

      # --- Step 1: Django check + unit tests (needs PostgreSQL) ---
      - name: Run check and unit tests
        id: tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          ./scripts/test-in-container.sh check-and-unit 2>&1 | tee artifacts/tests.log

      # --- Step 2: Lint (needs Python installed, no DB) ---
      - name: Setup Python for static checks
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen --no-install-project

      - name: Run lint
        id: lint
        run: |
          set -euo pipefail
          uv run ruff check config apps tests manage.py 2>&1 | tee -a artifacts/lint.log

      - name: Run typecheck
        id: typecheck
        run: |
          set -euo pipefail
          uv run mypy config apps tests manage.py 2>&1 | tee -a artifacts/typecheck.log

      - name: Collect Docker diagnostics on failure
        if: failure()
        shell: bash
        run: |
          mkdir -p artifacts
          docker ps -a > artifacts/docker-ps.txt 2>&1 || true
          docker compose -p sirhosp-test -f compose.yml -f compose.test.yml logs --no-color > artifacts/compose-test.log 2>&1 || true

      - name: Force cleanup test stack
        if: always()
        shell: bash
        run: |
          docker compose -p sirhosp-test -f compose.yml -f compose.test.yml down --remove-orphans || true

      - name: Upload diagnostics artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-diagnostics
          path: artifacts/
          if-no-files-found: ignore
