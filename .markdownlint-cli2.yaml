# Configuração do markdownlint-cli2 para o projeto sirhosp
# Ref: https://github.com/DavidAnson/markdownlint-cli2
#
# Uso obrigatório: todo arquivo .md criado/alterado deve passar sem erros
# por `markdownlint-cli2` (ou `./scripts/markdown-lint.sh`).

config:
  # Ativar todas as regras default
  default: true

  # MD013/line-length — desabilitado porque docs técnicos em português
  # frequentemente excedem 80 caracteres. Não é prático requebrar
  # textos longos (URLs, tabelas, diagramas ASCII, paths).
  MD013: false

  # MD033/no-inline-html — permitido para diagramas ASCII em code blocks
  # e templates (ex: ADR template com placeholders).
  MD033: false

  # MD041/first-line-heading — desabilitado porque o projeto contém
  # arquivos .md que são textos de prompt LLM (apps/summaries/prompts/),
  # não documentos Markdown tradicionais. A primeira linha desses
  # arquivos é o início do prompt, não um heading.
  MD041: false

  # MD032/blanks-around-lists — desabilitado pela mesma razão do MD041.
  # Os prompts LLM contêm listas que fazem parte do texto do prompt;
  # adicionar blank lines alteraria o conteúdo enviado ao modelo.
  MD032: false

