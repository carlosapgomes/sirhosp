# =============================================================================
# Docker Compose - Override para produção
# Subir: db (já em compose.yml) + web com Gunicorn + worker
# Usar com: docker compose -f compose.yml -f compose.prod.yml [comando]
# =============================================================================

services:
  # Override db para usar porta de host configurável, igual ao dev.
  # POSTGRES_HOST_PORT: porta exposta no host (default: 5432).
  # POSTGRES_PORT: porta interna do container (sempre 5432).
  db:
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    container_name: sirhosp-web
    # Produção: código já está na imagem, sem bind mount
    ports:
      - "${DJANGO_PORT:-8000}:8000"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required in production}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-false}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:?DJANGO_ALLOWED_HOSTS is required}
      - POSTGRES_DB=${POSTGRES_DB:-sirhosp}
      - POSTGRES_USER=${POSTGRES_USER:-sirhosp}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_INTERNAL_PORT:-5432}
      # Credenciais do sistema legado (conector Playwright integrado)
      - SOURCE_SYSTEM_URL=${SOURCE_SYSTEM_URL:-}
      - SOURCE_SYSTEM_USERNAME=${SOURCE_SYSTEM_USERNAME:-}
      - SOURCE_SYSTEM_PASSWORD=${SOURCE_SYSTEM_PASSWORD:-}
      # LLM (OpenAI ou compatível) — usado pela UI/API de sumários
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-120}
      - SUMMARY_PHASE1_PROVIDER=${SUMMARY_PHASE1_PROVIDER:-}
      - SUMMARY_PHASE1_MODEL=${SUMMARY_PHASE1_MODEL:-}
      - SUMMARY_PHASE1_BASE_URL=${SUMMARY_PHASE1_BASE_URL:-}
      - SUMMARY_PHASE1_API_KEY=${SUMMARY_PHASE1_API_KEY:-}
      - SUMMARY_PHASE2_OPTION_1_LABEL=${SUMMARY_PHASE2_OPTION_1_LABEL:-}
      - SUMMARY_PHASE2_OPTION_1_PROVIDER=${SUMMARY_PHASE2_OPTION_1_PROVIDER:-}
      - SUMMARY_PHASE2_OPTION_1_MODEL=${SUMMARY_PHASE2_OPTION_1_MODEL:-}
      - SUMMARY_PHASE2_OPTION_1_BASE_URL=${SUMMARY_PHASE2_OPTION_1_BASE_URL:-}
      - SUMMARY_PHASE2_OPTION_1_API_KEY=${SUMMARY_PHASE2_OPTION_1_API_KEY:-}
      - SUMMARY_PHASE2_OPTION_1_ENABLED=${SUMMARY_PHASE2_OPTION_1_ENABLED:-false}
      - SUMMARY_PHASE2_OPTION_2_LABEL=${SUMMARY_PHASE2_OPTION_2_LABEL:-}
      - SUMMARY_PHASE2_OPTION_2_PROVIDER=${SUMMARY_PHASE2_OPTION_2_PROVIDER:-}
      - SUMMARY_PHASE2_OPTION_2_MODEL=${SUMMARY_PHASE2_OPTION_2_MODEL:-}
      - SUMMARY_PHASE2_OPTION_2_BASE_URL=${SUMMARY_PHASE2_OPTION_2_BASE_URL:-}
      - SUMMARY_PHASE2_OPTION_2_API_KEY=${SUMMARY_PHASE2_OPTION_2_API_KEY:-}
      - SUMMARY_PHASE2_OPTION_2_ENABLED=${SUMMARY_PHASE2_OPTION_2_ENABLED:-false}
      - SUMMARY_PHASE2_OPTION_3_LABEL=${SUMMARY_PHASE2_OPTION_3_LABEL:-}
      - SUMMARY_PHASE2_OPTION_3_PROVIDER=${SUMMARY_PHASE2_OPTION_3_PROVIDER:-}
      - SUMMARY_PHASE2_OPTION_3_MODEL=${SUMMARY_PHASE2_OPTION_3_MODEL:-}
      - SUMMARY_PHASE2_OPTION_3_BASE_URL=${SUMMARY_PHASE2_OPTION_3_BASE_URL:-}
      - SUMMARY_PHASE2_OPTION_3_API_KEY=${SUMMARY_PHASE2_OPTION_3_API_KEY:-}
      - SUMMARY_PHASE2_OPTION_3_ENABLED=${SUMMARY_PHASE2_OPTION_3_ENABLED:-false}
      - SUMMARY_PHASE2_OPTION_4_LABEL=${SUMMARY_PHASE2_OPTION_4_LABEL:-}
      - SUMMARY_PHASE2_OPTION_4_PROVIDER=${SUMMARY_PHASE2_OPTION_4_PROVIDER:-}
      - SUMMARY_PHASE2_OPTION_4_MODEL=${SUMMARY_PHASE2_OPTION_4_MODEL:-}
      - SUMMARY_PHASE2_OPTION_4_BASE_URL=${SUMMARY_PHASE2_OPTION_4_BASE_URL:-}
      - SUMMARY_PHASE2_OPTION_4_API_KEY=${SUMMARY_PHASE2_OPTION_4_API_KEY:-}
      - SUMMARY_PHASE2_OPTION_4_ENABLED=${SUMMARY_PHASE2_OPTION_4_ENABLED:-false}
      # uv: ambiente virtual em /opt/venv (dentro da imagem)
      # UV_NO_CACHE: desabilita cache em runtime para evitar problemas de permissão
      # GUNICORN_WORKER_TMP_DIR: diretório gravável para socket de controle do worker
      - UV_PROJECT_ENVIRONMENT=/opt/venv
      - UV_CACHE_DIR=/opt/.uv_cache
      - UV_NO_CACHE=1
      - GUNICORN_WORKER_TMP_DIR=/tmp/gunicorn
      # Proxy SOCKS5 para acessar o sistema legado via tailnet do hospital
      - PLAYWRIGHT_PROXY_SERVER=${PLAYWRIGHT_PROXY_SERVER:-socks5://sirhosp-tailscale-proxy:1055}
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
      hospital_edge:
        aliases:
          - prisma
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          urllib.request.urlopen('http://localhost:8000/health/', timeout=5)"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    # Sem container_name fixo para permitir escala com --scale worker=N.
    # Produção: código já está na imagem, sem bind mount
    # Necessário para reaper de processos filhos (Playwright/Chromium)
    # e evitar acúmulo de processos defunct.
    init: true
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required in production}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-false}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - POSTGRES_DB=${POSTGRES_DB:-sirhosp}
      - POSTGRES_USER=${POSTGRES_USER:-sirhosp}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_INTERNAL_PORT:-5432}
      # Credenciais do sistema legado (conector Playwright integrado)
      - SOURCE_SYSTEM_URL=${SOURCE_SYSTEM_URL:-}
      - SOURCE_SYSTEM_USERNAME=${SOURCE_SYSTEM_USERNAME:-}
      - SOURCE_SYSTEM_PASSWORD=${SOURCE_SYSTEM_PASSWORD:-}
      # uv: ambiente virtual em /opt/venv (dentro da imagem)
      # UV_NO_CACHE: desabilita cache em runtime para evitar problemas de permissão
      - UV_PROJECT_ENVIRONMENT=/opt/venv
      - UV_CACHE_DIR=/opt/.uv_cache
      - UV_NO_CACHE=1
      # Proxy SOCKS5 para acessar o sistema legado via tailnet do hospital
      - PLAYWRIGHT_PROXY_SERVER=${PLAYWRIGHT_PROXY_SERVER:-socks5://sirhosp-tailscale-proxy:1055}
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
      hospital_edge:
    command: ["uv", "run", "--no-sync", "python", "manage.py", "process_ingestion_runs", "--loop", "--sleep-seconds", "5"]
    restart: unless-stopped

  summary_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    container_name: sirhosp-summary-worker
    # Produção: código já está na imagem, sem bind mount
    # Necessário para reaper de processos filhos (Playwright/Chromium)
    # e evitar acúmulo de processos defunct.
    init: true
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required in production}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-false}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - POSTGRES_DB=${POSTGRES_DB:-sirhosp}
      - POSTGRES_USER=${POSTGRES_USER:-sirhosp}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_INTERNAL_PORT:-5432}
      # Credenciais do sistema legado (conector Playwright integrado)
      - SOURCE_SYSTEM_URL=${SOURCE_SYSTEM_URL:-}
      - SOURCE_SYSTEM_USERNAME=${SOURCE_SYSTEM_USERNAME:-}
      - SOURCE_SYSTEM_PASSWORD=${SOURCE_SYSTEM_PASSWORD:-}
      # LLM (OpenAI ou compatível) — necessário para sumário via IA
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-120}
      - SUMMARY_PHASE1_PROVIDER=${SUMMARY_PHASE1_PROVIDER:-}
      - SUMMARY_PHASE1_MODEL=${SUMMARY_PHASE1_MODEL:-}
      - SUMMARY_PHASE1_BASE_URL=${SUMMARY_PHASE1_BASE_URL:-}
      - SUMMARY_PHASE1_API_KEY=${SUMMARY_PHASE1_API_KEY:-}
      - SUMMARY_PHASE2_OPTION_1_LABEL=${SUMMARY_PHASE2_OPTION_1_LABEL:-}
      - SUMMARY_PHASE2_OPTION_1_PROVIDER=${SUMMARY_PHASE2_OPTION_1_PROVIDER:-}
      - SUMMARY_PHASE2_OPTION_1_MODEL=${SUMMARY_PHASE2_OPTION_1_MODEL:-}
      - SUMMARY_PHASE2_OPTION_1_BASE_URL=${SUMMARY_PHASE2_OPTION_1_BASE_URL:-}
      - SUMMARY_PHASE2_OPTION_1_API_KEY=${SUMMARY_PHASE2_OPTION_1_API_KEY:-}
      - SUMMARY_PHASE2_OPTION_1_ENABLED=${SUMMARY_PHASE2_OPTION_1_ENABLED:-false}
      - SUMMARY_PHASE2_OPTION_2_LABEL=${SUMMARY_PHASE2_OPTION_2_LABEL:-}
      - SUMMARY_PHASE2_OPTION_2_PROVIDER=${SUMMARY_PHASE2_OPTION_2_PROVIDER:-}
      - SUMMARY_PHASE2_OPTION_2_MODEL=${SUMMARY_PHASE2_OPTION_2_MODEL:-}
      - SUMMARY_PHASE2_OPTION_2_BASE_URL=${SUMMARY_PHASE2_OPTION_2_BASE_URL:-}
      - SUMMARY_PHASE2_OPTION_2_API_KEY=${SUMMARY_PHASE2_OPTION_2_API_KEY:-}
      - SUMMARY_PHASE2_OPTION_2_ENABLED=${SUMMARY_PHASE2_OPTION_2_ENABLED:-false}
      - SUMMARY_PHASE2_OPTION_3_LABEL=${SUMMARY_PHASE2_OPTION_3_LABEL:-}
      - SUMMARY_PHASE2_OPTION_3_PROVIDER=${SUMMARY_PHASE2_OPTION_3_PROVIDER:-}
      - SUMMARY_PHASE2_OPTION_3_MODEL=${SUMMARY_PHASE2_OPTION_3_MODEL:-}
      - SUMMARY_PHASE2_OPTION_3_BASE_URL=${SUMMARY_PHASE2_OPTION_3_BASE_URL:-}
      - SUMMARY_PHASE2_OPTION_3_API_KEY=${SUMMARY_PHASE2_OPTION_3_API_KEY:-}
      - SUMMARY_PHASE2_OPTION_3_ENABLED=${SUMMARY_PHASE2_OPTION_3_ENABLED:-false}
      - SUMMARY_PHASE2_OPTION_4_LABEL=${SUMMARY_PHASE2_OPTION_4_LABEL:-}
      - SUMMARY_PHASE2_OPTION_4_PROVIDER=${SUMMARY_PHASE2_OPTION_4_PROVIDER:-}
      - SUMMARY_PHASE2_OPTION_4_MODEL=${SUMMARY_PHASE2_OPTION_4_MODEL:-}
      - SUMMARY_PHASE2_OPTION_4_BASE_URL=${SUMMARY_PHASE2_OPTION_4_BASE_URL:-}
      - SUMMARY_PHASE2_OPTION_4_API_KEY=${SUMMARY_PHASE2_OPTION_4_API_KEY:-}
      - SUMMARY_PHASE2_OPTION_4_ENABLED=${SUMMARY_PHASE2_OPTION_4_ENABLED:-false}
      # uv: ambiente virtual em /opt/venv (dentro da imagem)
      # UV_NO_CACHE: desabilita cache em runtime para evitar problemas de permissão
      - UV_PROJECT_ENVIRONMENT=/opt/venv
      - UV_CACHE_DIR=/opt/.uv_cache
      - UV_NO_CACHE=1
      # Proxy SOCKS5 para acessar o sistema legado via tailnet do hospital
      - PLAYWRIGHT_PROXY_SERVER=${PLAYWRIGHT_PROXY_SERVER:-socks5://sirhosp-tailscale-proxy:1055}
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
      hospital_edge:
    command: ["uv", "run", "--no-sync", "python", "manage.py", "process_summary_runs", "--pipeline", "--loop", "--sleep-seconds", "5"]
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Sidecar Tailscale para proxy SOCKS5 do hospital (produção)
  # Provê acesso à tailnet do hospital para Playwright scraping.
  # -------------------------------------------------------------------------
  tailscale_app:
    image: tailscale/tailscale:latest
    container_name: sirhosp-tailscale-proxy
    hostname: sirhosp-tailscale-proxy
    init: true
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:?TS_AUTHKEY is required for hospital tailnet}
      - TS_HOSTNAME=sirhosp-tailscale-proxy
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
      - TS_SOCKS5_SERVER=0.0.0.0:1055
      - TS_EXTRA_ARGS=--accept-routes --accept-dns=false
    volumes:
      - sirhosp_tailscale_state:/var/lib/tailscale
    networks:
      - hospital_edge
    restart: unless-stopped

volumes:
  sirhosp_tailscale_state:
    driver: local

networks:
  hospital_edge:
    external: true
