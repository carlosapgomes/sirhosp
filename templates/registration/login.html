{% extends "base.html" %}
{% load static %}

{% block title %}Login — Prisma{% endblock %}

{% block body %}
<div class="sirhosp-public-bg d-flex align-items-center justify-content-center min-vh-100 p-3">
  <div class="card shadow-lg border-0" style="max-width: 420px; width: 100%; border-radius: 1rem;">
    <div class="card-body text-center p-4">
      <div class="mb-4">
        <img src="{% static 'img/prisma-mark.svg' %}" alt="Prisma" class="prisma-public-mark mb-3" width="56" height="56">
        <h1 class="h4 fw-bold mb-1" style="color: var(--sirhosp-sidebar-bg);">Acesso ao portal</h1>
        <p class="text-muted small">Prisma</p>
      </div>

      {% if form.errors %}
        <div class="alert alert-danger d-flex align-items-center gap-2 py-2 small" role="alert">
          <i class="bi bi-exclamation-circle"></i>
          Usuário ou senha inválidos.
        </div>
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}
        {% if next %}
          <input type="hidden" name="next" value="{{ next }}">
        {% endif %}

        <div class="mb-3 text-start">
          <label for="id_username" class="form-label small fw-semibold text-muted">Usuário</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" name="username" id="id_username"
                   placeholder="Seu usuário" autofocus required>
          </div>
        </div>

        <div class="mb-4 text-start">
          <label for="id_password" class="form-label small fw-semibold text-muted">Senha</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" name="password" id="id_password"
                   placeholder="Sua senha" required>
          </div>
        </div>

        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
          </button>
          <a href="/" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i> Voltar ao início
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
