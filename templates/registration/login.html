<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — SIRHOSP</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; line-height: 1.5; }
      .container { max-width: 400px; margin: 4rem auto; }
      input[type="text"], input[type="password"] {
        width: 100%; padding: 0.5rem; margin: 0.25rem 0 0.75rem; box-sizing: border-box;
      }
      button { padding: 0.5rem 1.5rem; }
      .errors { color: #c00; }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>SIRHOSP</h1>
      <h2>Login</h2>

      {% if form.errors %}
      <p class="errors">Usuário ou senha inválidos.</p>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <label for="id_username">Usuário</label>
        <input type="text" name="username" id="id_username" autofocus>
        <label for="id_password">Senha</label>
        <input type="password" name="password" id="id_password">
        <button type="submit">Entrar</button>
      </form>
    </main>
  </body>
</html>
