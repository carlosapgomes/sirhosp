<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — SIRHOSP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <div class="text-center mb-4">
                <p class="text-uppercase text-muted fw-semibold mb-1">SIRHOSP</p>
                <h1 class="h4 mb-0">Acesso ao portal</h1>
              </div>

              {% if form.errors %}
                <div class="alert alert-danger" role="alert">
                  Usuário ou senha inválidos.
                </div>
              {% endif %}

              <form method="post" novalidate>
                {% csrf_token %}
                {% if next %}
                  <input type="hidden" name="next" value="{{ next }}">
                {% endif %}

                <div class="mb-3">
                  <label for="id_username" class="form-label">Usuário</label>
                  <input type="text" class="form-control" name="username" id="id_username" autofocus required>
                </div>

                <div class="mb-4">
                  <label for="id_password" class="form-label">Senha</label>
                  <input type="password" class="form-control" name="password" id="id_password" required>
                </div>

                <div class="d-grid gap-2">
                  <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
                  <a href="/" class="btn btn-outline-secondary">Voltar</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
