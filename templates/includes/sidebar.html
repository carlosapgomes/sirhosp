<aside class="sirhosp-sidebar" id="sidebar" role="navigation" aria-label="Menu principal">
  <!-- Brand -->
  <a href="{% if user.is_authenticated %}{% url 'services_portal:dashboard' %}{% else %}/{% endif %}" class="sirhosp-sidebar-brand">
    <i class="bi bi-heart-pulse"></i>
    SIRHosp
  </a>

  <!-- Navigation -->
  <nav class="sirhosp-sidebar-nav">
    <a href="{% url 'services_portal:dashboard' %}" class="sirhosp-sidebar-link {% if active_menu == 'dashboard' %}active{% endif %}">
      <i class="bi bi-grid-1x2-fill"></i>
      Dashboard
    </a>
    <a href="{% url 'services_portal:censo' %}" class="sirhosp-sidebar-link {% if active_menu == 'censo' %}active{% endif %}">
      <i class="bi bi-hospital"></i>
      Censo
    </a>
    <a href="{% url 'census:bed_status' %}" class="sirhosp-sidebar-link {% if active_menu == 'leitos' %}active{% endif %}">
      <i class="bi bi-door-open"></i>
      Leitos
    </a>
    <!-- Setores toggle -->
    <a class="sirhosp-sidebar-link" data-bs-toggle="collapse" href="#sidebar-setores" role="button" aria-expanded="{% if active_menu == 'setores' %}true{% else %}false{% endif %}">
      <i class="bi bi-geo-alt"></i>
      <span>Setores</span>
      <i class="bi bi-chevron-down ms-auto small"></i>
    </a>
    <div class="collapse {% if active_menu == 'setores' %}show{% endif %}" id="sidebar-setores">
      <ul class="nav flex-column ms-3">
        <li class="nav-item">
          <a class="nav-link small sirhosp-sidebar-link py-1 px-2"
             href="{% url 'services_portal:sector_occupation' %}">
            Ocupação
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link small sirhosp-sidebar-link py-1 px-2" href="#">
            Indicadores
          </a>
        </li>
      </ul>
    </div>
    <a href="{% url 'patients:patient_list' %}" class="sirhosp-sidebar-link {% if active_menu == 'pacientes' %}active{% endif %}">
      <i class="bi bi-people"></i>
      Pacientes
    </a>
    <a href="{% url 'services_portal:monitor_risco' %}" class="sirhosp-sidebar-link {% if active_menu == 'monitor' %}active{% endif %}">
      <i class="bi bi-exclamation-triangle"></i>
      Monitor de Risco
    </a>
    <a href="{% url 'summaries:logs_public' %}" class="sirhosp-sidebar-link {% if active_menu == 'logs' %}active{% endif %}">
      <i class="bi bi-journal-text"></i>
      Logs de Resumos
    </a>
  </nav>

  <!-- Footer -->
  {% if user.is_authenticated %}
  <div class="sirhosp-sidebar-footer">
    <div class="d-flex align-items-center gap-2 text-white-50 small mb-2">
      <i class="bi bi-person-circle"></i>
      {{ user.username }}
    </div>
    <form method="post" action="{% url 'logout' %}" class="d-grid">
      {% csrf_token %}
      <button type="submit" class="btn btn-sm btn-outline-light">
        <i class="bi bi-box-arrow-right me-1"></i> Sair
      </button>
    </form>
  </div>
  {% endif %}
</aside>
