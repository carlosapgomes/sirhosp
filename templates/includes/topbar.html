{% load static %}

<header class="sirhosp-topbar">
  <button class="sirhosp-topbar-toggle" id="sidebarToggle" aria-label="Abrir menu" title="Menu">
    <i class="bi bi-list"></i>
  </button>
  <span class="sirhosp-topbar-brand">
    <img src="{% static 'img/prisma-mark.svg' %}" alt="" class="prisma-brand-mark prisma-brand-mark-topbar" width="16" height="16" aria-hidden="true">
    Prisma
    <span class="sirhosp-topbar-brand-sep">&middot;</span>
  </span>
  <h1 class="sirhosp-topbar-title">{{ page_title|default:"Prisma" }}</h1>
  <div class="sirhosp-topbar-sync">
    <span class="dot"></span>
    <span class="sirhosp-topbar-sync-label">Sincronizado: </span>{{ sync_time|default:"--:--" }}
  </div>
</header>
