# =============================================================================
# Docker Compose - Override para desenvolvimento
# Subir: db (já em compose.yml) + web em modo dev
# =============================================================================

services:
  db:
    # Dev-only host binding to avoid conflicts with other local projects.
    # Internal container port remains 5432 (used by web/worker via POSTGRES_HOST=db).
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: sirhosp-web
    volumes:
      - .:/app
    ports:
      - "${DJANGO_PORT:-8000}:8000"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-change-me}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-true}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - POSTGRES_DB=${POSTGRES_DB:-sirhosp}
      - POSTGRES_USER=${POSTGRES_USER:-sirhosp}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_INTERNAL_PORT:-5432}
      # Credenciais do sistema legado (conector Playwright integrado)
      - SOURCE_SYSTEM_URL=${SOURCE_SYSTEM_URL:-}
      - SOURCE_SYSTEM_USERNAME=${SOURCE_SYSTEM_USERNAME:-}
      - SOURCE_SYSTEM_PASSWORD=${SOURCE_SYSTEM_PASSWORD:-}
      # Proxy opcional para Playwright via sidecar Tailscale (dev-only)
      - PLAYWRIGHT_PROXY_SERVER=${PLAYWRIGHT_PROXY_SERVER:-}
      # uv: ambiente virtual fora do bind mount (/opt) para evitar problemas de permissão
      - UV_PROJECT_ENVIRONMENT=/opt/venv
      - UV_CACHE_DIR=/home/10001/.uv_cache
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    # Necessário para reaper de processos filhos (Playwright/Chromium)
    # e evitar acúmulo de processos defunct.
    init: true
    volumes:
      - .:/app
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-change-me}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-true}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - POSTGRES_DB=${POSTGRES_DB:-sirhosp}
      - POSTGRES_USER=${POSTGRES_USER:-sirhosp}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_INTERNAL_PORT:-5432}
      # Credenciais do sistema legado (conector Playwright integrado)
      - SOURCE_SYSTEM_URL=${SOURCE_SYSTEM_URL:-}
      - SOURCE_SYSTEM_USERNAME=${SOURCE_SYSTEM_USERNAME:-}
      - SOURCE_SYSTEM_PASSWORD=${SOURCE_SYSTEM_PASSWORD:-}
      # Proxy opcional para Playwright via sidecar Tailscale (dev-only)
      - PLAYWRIGHT_PROXY_SERVER=${PLAYWRIGHT_PROXY_SERVER:-}
      # uv: ambiente virtual fora do bind mount (/opt) para evitar problemas de permissão
      - UV_PROJECT_ENVIRONMENT=/opt/venv
      - UV_CACHE_DIR=/home/10001/.uv_cache
    depends_on:
      db:
        condition: service_healthy
    command: ["uv", "run", "--no-sync", "python", "manage.py", "process_ingestion_runs", "--loop", "--sleep-seconds", "5"]
    restart: unless-stopped

  summary_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: sirhosp-summary-worker
    # Necessário para reaper de processos filhos (Playwright/Chromium)
    # e evitar acúmulo de processos defunct.
    init: true
    volumes:
      - .:/app
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-change-me}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-true}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - POSTGRES_DB=${POSTGRES_DB:-sirhosp}
      - POSTGRES_USER=${POSTGRES_USER:-sirhosp}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_INTERNAL_PORT:-5432}
      # Credenciais do sistema legado (conector Playwright integrado)
      - SOURCE_SYSTEM_URL=${SOURCE_SYSTEM_URL:-}
      - SOURCE_SYSTEM_USERNAME=${SOURCE_SYSTEM_USERNAME:-}
      - SOURCE_SYSTEM_PASSWORD=${SOURCE_SYSTEM_PASSWORD:-}
      # Proxy opcional para Playwright via sidecar Tailscale (dev-only)
      - PLAYWRIGHT_PROXY_SERVER=${PLAYWRIGHT_PROXY_SERVER:-}
      # LLM (OpenAI ou compatível) — necessário para sumário via IA
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-120}
      # uv: ambiente virtual fora do bind mount (/opt) para evitar problemas de permissão
      - UV_PROJECT_ENVIRONMENT=/opt/venv
      - UV_CACHE_DIR=/home/10001/.uv_cache
    depends_on:
      db:
        condition: service_healthy
    command: ["uv", "run", "--no-sync", "python", "manage.py", "process_summary_runs", "--pipeline", "--loop", "--sleep-seconds", "5"]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Sidecar Tailscale dev-only (userspace + SOCKS5)
  # Ativado via profile "tailscale"; requer TS_AUTHKEY para autenticar.
  # Usado como proxy opcional pelo Playwright nos serviços acima.
  # Não requer /dev/net/tun, NET_ADMIN, NET_RAW ou privileged.
  # Documentação: docs/dev-tailscale.md (slice S4)
  # ---------------------------------------------------------------------------
  tailscale-app:
    profiles:
      - tailscale
    image: tailscale/tailscale:latest
    container_name: sirhosp-tailscale
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_USERSPACE=true
      - TS_SOCKS5_SERVER=0.0.0.0:1055
      - TS_EXTRA_ARGS=--accept-routes
    volumes:
      - sirhosp_tailscale_state:/var/lib/tailscale
    restart: unless-stopped

volumes:
  sirhosp_tailscale_state:
    driver: local
